services:
  eureka-server:
    build:
      context: ./eureka-server
    ports:
      - "8761:8761"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    networks:
      - ecommerce

  user-db:
    image: postgres:16
    environment:
      POSTGRES_DB: user-service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user-service"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce

  order-db:
    image: postgres:16
    environment:
      POSTGRES_DB: order-service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d order-service"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce

  product-db:
    image: postgres:16
    environment:
      POSTGRES_DB: product-service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - product_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product-service"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce

  cart-db:
    image: postgres:16
    environment:
      POSTGRES_DB: cart-service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - cart_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cart-service"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce

  inventory-db:
    image: postgres:16
    environment:
      POSTGRES_DB: inventory-service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory-service"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce

  payment-db:
    image: postgres:16
    environment:
      POSTGRES_DB: payment-service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment-service"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce

  notification-db:
    image: postgres:16
    environment:
      POSTGRES_DB: notification-service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification-service"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce

  user-service:
    build:
      context: ./user-service
    ports:
      - "8082:8082"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/user-service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      eureka-server:
        condition: service_started
      user-db:
        condition: service_healthy
    networks:
      - ecommerce

  order-service:
    build:
      context: ./order-service
    ports:
      - "8083:8083"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/order-service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      eureka-server:
        condition: service_started
      order-db:
        condition: service_healthy
      user-service:
        condition: service_started
      cart-service:
        condition: service_started
      payment-service:
        condition: service_started
      product-service:
        condition: service_started
      inventory-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - ecommerce

  product-service:
    build:
      context: ./product-service
    ports:
      - "8084:8084"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://product-db:5432/product-service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      eureka-server:
        condition: service_started
      product-db:
        condition: service_healthy
    networks:
      - ecommerce

  cart-service:
    build:
      context: ./cart-service
    ports:
      - "8004:8004"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://cart-db:5432/cart-service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      eureka-server:
        condition: service_started
      cart-db:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      inventory-service:
        condition: service_started
    networks:
      - ecommerce

  inventory-service:
    build:
      context: ./inventory-service
    ports:
      - "8087:8087"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://inventory-db:5432/inventory-service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      eureka-server:
        condition: service_started
      inventory-db:
        condition: service_healthy
    networks:
      - ecommerce

  payment-service:
    build:
      context: ./payment-service
    ports:
      - "8085:8085"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-db:5432/payment-service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      eureka-server:
        condition: service_started
      payment-db:
        condition: service_healthy
    networks:
      - ecommerce

  notification-service:
    build:
      context: ./notification-service
    ports:
      - "8086:8086"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-db:5432/notification-service
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      eureka-server:
        condition: service_started
      notification-db:
        condition: service_healthy
    networks:
      - ecommerce

  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
      user-service:
        condition: service_started
      order-service:
        condition: service_started
      product-service:
        condition: service_started
      cart-service:
        condition: service_started
      inventory-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - ecommerce

networks:
  ecommerce:
    driver: bridge

volumes:
  user_db_data:
  order_db_data:
  product_db_data:
  cart_db_data:
  inventory_db_data:
  payment_db_data:
  notification_db_data:
